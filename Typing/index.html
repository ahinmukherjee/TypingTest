<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Game</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 420px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

#sentence {
    font-size: 18px;
    margin-bottom: 15px;
}

textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    padding: 10px;
    border: 2px solid #ccc;
    outline: none;
    transition: 0.3s;
}

textarea:focus {
    border-color: #0072ff;
    box-shadow: 0 0 10px #0072ff;
}

.info {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Typing Speed Game</h1>

    <p id="sentence"></p>

    <textarea id="input" placeholder="Start typing here..."></textarea>

    <p id="result"></p>

    <div class="info">
        <span id="time">Time: 0s</span>
        <span id="wpm">WPM: 0</span>
        <span id="score">Score: 0</span>
    </div>
</div>

<script>
const sentences = [
    "I love coding",
    "JavaScript is fun",
    "Practice daily",
    "Code and learn",
    "Typing is easy",
    "Learn step by step",
    "Keep it simple",
    "Focus and type",
    "Small steps matter",
    "Never give up"
];

let index = 0;
let startTime;
let timerInterval;
let score = 0;

const sentenceEl = document.getElementById("sentence");
const inputEl = document.getElementById("input");
const resultEl = document.getElementById("result");
const timeEl = document.getElementById("time");
const wpmEl = document.getElementById("wpm");
const scoreEl = document.getElementById("score");

function loadSentence() {
    sentenceEl.innerText = sentences[index];
    inputEl.value = "";
    resultEl.innerText = "";

    // Reset Timer
    clearInterval(timerInterval);
    startTime = new Date();
    timerInterval = setInterval(updateTime, 1000);

    inputEl.focus();
}

function updateTime() {
    let currentTime = Math.floor((new Date() - startTime) / 1000);
    timeEl.innerText = "Time: " + currentTime + "s";
}

inputEl.addEventListener("input", () => {
    let typed = inputEl.value;
    let original = sentences[index];

    // Accuracy calculation
    let correctChars = 0;
    for (let i = 0; i < typed.length; i++) {
        if (typed[i] === original[i]) {
            correctChars++;
        }
    }

    let accuracy = Math.round((correctChars / original.length) * 100);

    if (typed === original) {
        clearInterval(timerInterval);

        let timeTaken = (new Date() - startTime) / 1000;
        let words = original.split(" ").length;
        let wpm = Math.round((words / timeTaken) * 60);

        // Score calculation
        let roundScore = Math.round(wpm + accuracy);
        score += roundScore;

        resultEl.innerText = "✅ Correct!";
        wpmEl.innerText = "WPM: " + wpm;
        scoreEl.innerText = "Score: " + score;

        index++;

        if (index < sentences.length) {
            setTimeout(loadSentence, 1000);
        } else {
            resultEl.innerText = "🎉 Completed all sentences!";
        }
    } else {
        resultEl.innerText = "❌ Keep typing...";
    }
});

// Start game
loadSentence();
</script>

</body>
</html>
