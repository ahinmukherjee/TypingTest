<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Typing Game</h1>
    <p id="sentence"></p>
    <textarea id="input" placeholder="Start typing here..."></textarea>
    <p id="result"></p>
    
    <div class="info">
        <span id="time">Time: 0s</span>
        <span id="wpm">WPM: 0</span>
        <span id="score">Score: 0</span>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
